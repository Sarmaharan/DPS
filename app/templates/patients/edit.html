{% extends "base.html" %}
{% block title %}Edit {{ patient.patient_id }} - DPS{% endblock %}
{% block content %}
<h1>Edit Patient</h1>
<div class="card">
    <form method="POST" action="{{ url_for('patient.edit', id=patient.id) }}">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
                <label for="first_name">First Name</label>
                <input type="text" id="first_name" name="first_name" value="{{ patient.first_name }}" required>
            </div>
            <div class="form-group">
                <label for="last_name">Last Name</label>
                <input type="text" id="last_name" name="last_name" value="{{ patient.last_name }}" required>
            </div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
                <label for="date_of_birth">Date of Birth</label>
                <input type="date" id="date_of_birth" name="date_of_birth" value="{{ patient.date_of_birth }}" required>
            </div>
            <div class="form-group">
                <label for="gender">Gender</label>
                <select id="gender" name="gender" required>
                    <option value="Male" {% if patient.gender=='Male' %}selected{% endif %}>Male</option>
                    <option value="Female" {% if patient.gender=='Female' %}selected{% endif %}>Female</option>
                    <option value="Other" {% if patient.gender=='Other' %}selected{% endif %}>Other</option>
                </select>
            </div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
                <label for="contact_number">Contact Number</label>
                <input type="text" id="contact_number" name="contact_number" value="{{ patient.contact_number or '' }}">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" value="{{ patient.email or '' }}">
            </div>
        </div>
        <div class="form-group">
            <label for="address">Address</label>
            <textarea id="address" name="address" rows="2">{{ patient.address or '' }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{{ url_for('patient.view', id=patient.id) }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
