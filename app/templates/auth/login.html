{% extends "base.html" %}
{% block title %}Login - DPS{% endblock %}
{% block content %}
<div style="max-width: 400px;">
    <h1 style="margin-bottom: 0.5rem; color: var(--accent-teal);">DPS</h1>
    <p style="color: var(--text-muted); margin-bottom: 2rem;">AI-Based Diabetes Prediction and Patient Management</p>
    <div class="card">
        <h2 style="font-size: 1.25rem; margin-bottom: 1.5rem;">Sign In</h2>
        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">Login</button>
        </form>
        <p style="margin-top: 1rem; font-size: 0.85rem; color: var(--text-muted);">Default: admin/admin123, doctor/doctor123, staff/staff123</p>
    </div>
</div>
{% endblock %}
